<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福岡 釣り船予約状況ナビ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>福岡 釣り船予約状況ナビ</h1>
        <p id="last-update">データ読み込み中...</p>
    </header>

    <main id="boat-container">
        </main>

    <script>
        async function loadSchedules() {
            try {
                const response = await fetch('fishing_schedule.json');
                const data = await response.json();
                
                const container = document.getElementById('boat-container');
                container.innerHTML = ''; // クリア

                // 最終更新日を表示
                document.getElementById('last-update').innerText = `最終更新: ${new Date().toLocaleString('ja-JP')}`;

                // 各船のデータをループで処理
                for (const boatName in data.boat_info) {
                    const info = data.boat_info[boatName];
                    const scheduleData = data.schedules[boatName] ? data.schedules[boatName].data : [];

                    // カードの作成
                    const card = document.createElement('section');
                    card.className = 'boat-card';
                    
                    let html = `
                        <div class="boat-header">
                            <h2>${boatName} <span class="area-tag">${info.area}</span></h2>
                            <a href="${info.link}" target="_blank" class="official-link">公式サイト ↗</a>
                        </div>
                        <div class="calendar-grid">
                    `;

                    if (scheduleData.length === 0) {
                        html += `<p class="no-data">現在、取得できる予定はありません。</p>`;
                    } else {
                        // 日付順にソート（念のため）
                        scheduleData.sort((a, b) => {
                            const dateA = parseInt(a.date.match(/\d+/g).join(''));
                            const dateB = parseInt(b.date.match(/\d+/g).join(''));
                            return dateA - dateB;
                        });

                        scheduleData.forEach(item => {
                            // 不要なゴミデータ（数字だけのdetailなど）を簡易フィルタリング
                            if (item.detail.length < 2 && !isNaN(item.detail)) return;

                            html += `
                                <div class="day-box status-${item.status}">
                                    <div class="date-label">${item.date}</div>
                                    <div class="status-icon">${item.status}</div>
                                    <div class="detail-text">${item.detail}</div>
                                </div>
                            `;
                        });
                    }

                    html += `</div>`;
                    card.innerHTML = html;
                    container.appendChild(card);
                }
            } catch (error) {
                console.error('Error loading JSON:', error);
                document.getElementById('last-update').innerText = 'データの読み込みに失敗しました。';
            }
        }

        loadSchedules();
    </script>
</body>
</html>
