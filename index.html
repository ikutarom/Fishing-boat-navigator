<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>釣り船予約状況一覧</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; line-height: 1.6; color: #333; max-width: 1000px; margin: 0 auto; padding: 20px; background-color: #f8f9fa; }
        h1 { text-align: center; color: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: center; } /* 基本中央寄せ */
        th { background-color: #007bff; color: white; position: sticky; top: 0; }
        
        /* 船名列の設定 */
        .boat-name { font-weight: bold; font-size: 1.1em; display: block; }
        .boat-area { font-size: 0.8em; color: #666; display: block; margin-top: 2px; }
        
        /* ステータス記号の強調 */
        .status-ok { color: #28a745; font-weight: bold; }
        .status-few { color: #ffc107; font-weight: bold; }
        .status-full { color: #dc3545; font-weight: bold; }

        /* 曜日別の色 */
        .sat { color: #007bff; background-color: #f0f7ff; } /* 土曜日: 青系 */
        .sun { color: #dc3545; background-color: #fff0f0; } /* 日曜日・祝日: 赤系 */
        
        tr:hover { background-color: #f1f1f1; }
        .link-btn { text-decoration: none; color: #007bff; font-size: 0.9em; }
        .link-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h1>🎣 釣り船予約状況一覧</h1>
    <div id="last-update" style="text-align: right; font-size: 0.8em; color: #888;"></div>
    
    <table id="schedule-table">
        <thead>
            <tr>
                <th>日付</th>
                <th>船名</th>
                <th>状況</th>
                <th>予約内容</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        async function loadSchedule() {
            try {
                const response = await fetch('fishing_schedule.json');
                const data = await response.json();
                const tbody = document.querySelector('#schedule-table tbody');
                
                // 日付順にソートするための準備（簡易版）
                let allData = [];
                for (const boatName in data.schedules) {
                    const boatInfo = data.boat_info[boatName];
                    data.schedules[boatName].data.forEach(item => {
                        allData.push({
                            ...item,
                            boatName: boatName,
                            official: boatInfo.link,
                            area: boatInfo.area
                        });
                    });
                }

                // 日付でソート
                allData.sort((a, b) => {
                    const dateA = a.date.match(/\d+/g).map(Number);
                    const dateB = b.date.match(/\d+/g).map(Number);
                    return dateA[0] !== dateB[0] ? dateA[0] - dateB[0] : dateA[1] - dateB[1];
                });

                allData.forEach(item => {
                    const tr = document.createElement('tr');
                    
                    // 曜日とクラスの判定
                    const dateObj = parseDate(item.date);
                    const dayOfWeek = dateObj.getDay(); // 0:日, 6:土
                    const dayLabels = ["日", "月", "火", "水", "木", "金", "土"];
                    let dayClass = "";
                    if (dayOfWeek === 0) dayClass = "sun";
                    if (dayOfWeek === 6) dayClass = "sat";

                    // ステータスに応じたクラス
                    let statusClass = "status-ok";
                    if (item.status === "×") statusClass = "status-full";
                    if (item.status === "△") statusClass = "status-few";

                    tr.innerHTML = `
                        <td class="${dayClass}">${item.date} (${dayLabels[dayOfWeek]})</td>
                        <td>
                            <a href="${item.official}" target="_blank" class="link-btn">
                                <span class="boat-name">${item.boatName}</span>
                                <span class="boat-area">📍 ${item.area}</span>
                            </a>
                        </td>
                        <td class="${statusClass}">${item.status}</td>
                        <td>${item.detail}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error("Error loading JSON:", error);
            }
        }

        // "3月11日" を Date オブジェクトに変換（2026年固定）
        function parseDate(dateStr) {
            const m = dateStr.match(/(\d+)月(\d+)日/);
            return new Date(2026, parseInt(m[1]) - 1, parseInt(m[2]));
        }

        loadSchedule();
    </script>
</body>
</html>
