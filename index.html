<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>釣り船予約状況マトリックス</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; background-color: #f4f7f8; padding: 20px; }
        h1 { text-align: center; color: #333; }
        
        table { border-collapse: collapse; width: 100%; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; font-size: 14px; }
        
        /* ヘッダーの設定 */
        th { background-color: #f0f0f0; position: sticky; top: 0; z-index: 10; }
        .boat-header { min-width: 120px; }
        .boat-name { font-weight: bold; display: block; }
        .boat-area { font-size: 11px; color: #666; font-weight: normal; }

        /* 日付列の設定 */
        .date-col { font-weight: bold; background-color: #fafafa; min-width: 100px; }
        
        /* 土日祝日の背景色 */
        .sat { background-color: #eef6ff !important; color: #0052cc; } /* 土曜日: 青系 */
        .sun { background-color: #fff0f0 !important; color: #d93025; } /* 日曜日・祝日: 赤系 */

        /* 予約ステータス */
        .status-ok { color: #28a745; font-weight: bold; }
        .status-few { color: #f29900; font-weight: bold; }
        .status-full { color: #d93025; font-weight: bold; }
        .detail-text { font-size: 11px; color: #555; display: block; margin-top: 2px; }

        .link-btn { text-decoration: none; color: inherit; }
        .link-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h1>🎣 釣り船予約マトリックス</h1>
    
    <table id="schedule-matrix">
        <thead>
            <tr id="header-row">
                <th>日付</th>
            </tr>
        </thead>
        <tbody id="matrix-body">
            </tbody>
    </table>

    <script>
        async function loadMatrix() {
            try {
                const response = await fetch('fishing_schedule.json');
                const data = await response.json();
                
                const boats = Object.keys(data.boat_info);
                const headerRow = document.getElementById('header-row');
                const matrixBody = document.getElementById('matrix-body');

                // 1. ヘッダー（船名＋出港地）を生成
                boats.forEach(name => {
                    const info = data.boat_info[name];
                    const th = document.createElement('th');
                    th.className = 'boat-header';
                    th.innerHTML = `
                        <a href="${info.link}" target="_blank" class="link-btn">
                            <span class="boat-name">${name}</span>
                            <span class="boat-area">📍 ${info.area}</span>
                        </a>
                    `;
                    headerRow.appendChild(th);
                });

                // 2. 全データのユニークな日付を取得してソート
                const dateSet = new Set();
                for (const boat in data.schedules) {
                    data.schedules[boat].data.forEach(item => dateSet.add(item.date));
                }
                const sortedDates = Array.from(dateSet).sort((a, b) => {
                    const d1 = a.match(/\d+/g).map(Number);
                    const d2 = b.match(/\d+/g).map(Number);
                    return d1[0] !== d2[0] ? d1[0] - d2[0] : d1[1] - d2[1];
                });

                // 3. 各日付の行を生成
                sortedDates.forEach(dateStr => {
                    const tr = document.createElement('tr');
                    
                    // 日付セル（曜日判定と色付け）
                    const dateObj = parseDate(dateStr);
                    const dayNum = dateObj.getDay();
                    const dayLabel = ["日", "月", "火", "水", "木", "金", "土"][dayNum];
                    
                    let dateClass = "date-col";
                    if (dayNum === 0) dateClass += " sun";
                    if (dayNum === 6) dateClass += " sat";

                    const dateTd = document.createElement('td');
                    dateTd.className = dateClass;
                    dateTd.innerText = `${dateStr}(${dayLabel})`;
                    tr.appendChild(dateTd);

                    // 各船のデータを埋める
                    boats.forEach(boatName => {
                        const td = document.createElement('td');
                        const schedule = data.schedules[boatName]?.data.find(s => s.date === dateStr);
                        
                        if (schedule) {
                            let statusClass = "status-ok";
                            if (schedule.status === "×") statusClass = "status-full";
                            if (schedule.status === "△") statusClass = "status-few";

                            td.innerHTML = `
                                <span class="${statusClass}">${schedule.status}</span>
                                <span class="detail-text">${schedule.detail}</span>
                            `;
                        } else {
                            td.innerText = "-"; // データなし
                        }
                        tr.appendChild(td);
                    });

                    matrixBody.appendChild(tr);
                });

            } catch (error) {
                console.error("Matrix load error:", error);
            }
        }

        function parseDate(dateStr) {
            const m = dateStr.match(/(\d+)月(\d+)日/);
            // 2026年固定
            return new Date(2026, parseInt(m[1]) - 1, parseInt(m[2]));
        }

        loadMatrix();
    </script>
</body>
</html>
