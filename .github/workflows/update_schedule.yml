name: Fishing Schedule Auto Update

on:
  schedule:
    - cron: '0 * * * *'  # 1時間おき（毎時0分）に実行
  workflow_dispatch:      # GitHubの画面から手動でボタンを押して実行も可能にする

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v3

      - name: Pythonのセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 依存ライブラリのインストール
        run: |
          pip install -r requirements.txt

      - name: スクレイピングの実行
        run: python github_test.py  # 別名にした場合はその名前に合わせる

      - name: データの変更を保存して反映（Git Push）
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add fishing_schedule.json
          git commit -m "Auto Update: $(date)" || echo "No changes to commit"
          git push
